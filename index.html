<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini CRM — Clientes</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="container">
      <div class="topbar">
        <div>
          <h1>Mini CRM</h1>
          <p class="subtitle">Lista de clientes (Workshop: Construindo devs com IA)</p>
        </div>

        <div class="controls">
          <label class="field">
            <span>Perfil</span>
            <select id="roleSelect" aria-label="Selecionar perfil">
              <option value="viewer">Viewer (somente leitura)</option>
              <option value="editor">Editor (pode editar/excluir)</option>
            </select>
          </label>

          <label class="field">
            <span>Buscar</span>
            <input id="searchInput" placeholder="Ex.: Ana, João, Maria..." />
          </label>
        </div>
      </div>
    </header>

    <main class="container">
      <section class="meta">
        <div class="pill" id="rolePill">Perfil atual: viewer</div>
        <div class="pill" id="countPill">0 clientes</div>
      </section>

      <section id="list" class="grid" aria-label="Lista de clientes"></section>
    </main>

    <!-- Modal de confirmação de exclusão -->
    <div id="deleteModal" class="modal" role="dialog" aria-labelledby="deleteModalTitle" aria-modal="true" hidden>
      <div class="modal-backdrop" data-action="cancel"></div>
      <div class="modal-content" tabindex="-1">
        <h2 id="deleteModalTitle" class="modal-title">Confirmar exclusão</h2>
        <p class="modal-message">Tem certeza que deseja excluir este usuário?</p>
        <div class="modal-actions">
          <button type="button" class="modal-btn-cancel" data-action="cancel">Cancelar</button>
          <button type="button" class="modal-btn-confirm danger" data-action="confirm">Confirmar</button>
        </div>
      </div>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
